^play.toServer.types:
   packet_teleport_confirm:   
      teleportId: varint
   packet_query_block_nbt:   
      transactionId: varint
      location: position
   packet_select_bundle_item:   
      slotId: varint
      selectedItemIndex: varint
   packet_set_difficulty:   
      newDifficulty: varint =>
         0: peaceful
         1: easy
         2: normal
         3: hard
   packet_change_gamemode:   
      mode: varint =>
         0: survival
         1: creative
         2: adventure
         3: spectator
   packet_message_acknowledgement:   
      count: varint
   packet_chat_command:   
      command: string
   packet_chat_command_signed:   
      command: string
      timestamp: i64
      salt: i64
      argumentSignatures: []varint
         argumentName: string
         signature: [
            "buffer",
            {
               "count": 256
            }
         ]
      messageCount: varint
      acknowledged: [
         "buffer",
         {
            "count": 3
         }
      ]
      checksum: i8
   packet_chat_message:   
      message: string
      timestamp: i64
      salt: i64
      signature?: [
         "buffer",
         {
            "count": 256
         }
      ]
      offset: varint
      acknowledged: [
         "buffer",
         {
            "count": 3
         }
      ]
      checksum: u8
   packet_chat_session_update:   
      sessionUUID: UUID
      expireTime: i64
      publicKey: ByteArray
      signature: ByteArray
   packet_chunk_batch_received:   
      chunksPerTick: f32
   packet_client_command:   
      actionId: varint
   packet_tick_end:   
      # Empty
   packet_tab_complete:   
      transactionId: varint
      text: string
   packet_configuration_acknowledged:   
      # Empty
   packet_enchant_item:   
      windowId: ContainerID
