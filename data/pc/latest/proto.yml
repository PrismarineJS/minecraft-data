!version: 26.1.2

^types:
   varint: native
   varlong: native
   optvarint: varint
   pstring: native
   buffer: native
   u8: native
   u16: native
   u32: native
   u64: native
   i8: native
   i16: native
   i32: native
   i64: native
   bool: native
   f32: native
   f64: native
   UUID: native
   option: native
   entityMetadataLoop: native
   topBitSetTerminatedArray: native
   bitfield: native
   bitflags: native
   container: native
   switch: native
   void: native
   array: native
   restBuffer: native
   anonymousNbt: native
   anonOptionalNbt: native
   registryEntryHolder: native
   registryEntryHolderSet: native
   lpVec3: native
   ByteArray: [
      "buffer",
      {
         "countType": "varint"
      }
   ]
   string: [
      "pstring",
      {
         "countType": "varint"
      }
   ]
   vec2f:   
      x: f32
      y: f32
   vec3f:   
      x: f32
      y: f32
      z: f32
   vec4f:   
      x: f32
      y: f32
      z: f32
      w: f32
   vec3f64:   
      x: f64
      y: f64
      z: f64
   vec3i:   
      x: varint
      y: varint
      z: varint
   vec3i32:   
      x: i32
      y: i32
      z: i32
   IDSet: [
      "registryEntryHolderSet",
      {
         "base": {
            "name": "name",
            "type": "string"
         },
         "otherwise": {
            "name": "ids",
            "type": "varint"
         }
      }
   ]
   ContainerID: varint
   SlotComponentType: varint =>
      0: custom_data
      1: max_stack_size
      2: max_damage
      3: damage
      4: unbreakable
      5: use_effects
      6: custom_name
      7: minimum_attack_charge
      8: damage_type
      9: item_name
      10: item_model
      11: lore
      12: rarity
      13: enchantments
      14: can_place_on
      15: can_break
      16: attribute_modifiers
      17: custom_model_data
      18: tooltip_display
      19: repair_cost
      20: creative_slot_lock
      21: enchantment_glint_override
      22: intangible_projectile
      23: food
      24: consumable
      25: use_remainder
      26: use_cooldown
      27: damage_resistant
      28: tool
      29: weapon
      30: attack_range
      31: enchantable
      32: equippable
      33: repairable
      34: glider
      35: tooltip_style
      36: death_protection
      37: blocks_attacks
      38: piercing_weapon
      39: kinetic_weapon
      40: swing_animation
      41: stored_enchantments
      42: dyed_color
      43: map_color
      44: map_id
      45: map_decorations
      46: map_post_processing
      47: charged_projectiles
      48: bundle_contents
      49: potion_contents
      50: potion_duration_scale
      51: suspicious_stew_effects
      52: writable_book_content
      53: written_book_content
      54: trim
      55: debug_stick_state
      56: entity_data
      57: bucket_entity_data
      58: block_entity_data
      59: instrument
      60: provides_trim_material
      61: ominous_bottle_amplifier
      62: jukebox_playable
      63: provides_banner_patterns
      64: recipes
      65: lodestone_tracker
      66: firework_explosion
      67: fireworks
      68: profile
      69: note_block_sound
      70: banner_patterns
      71: base_color
      72: pot_decorations
      73: container
      74: block_state
      75: bees
      76: lock
      77: container_loot
      78: break_sound
      79: villager/variant
      80: wolf/variant
      81: wolf/sound_variant
      82: wolf/collar
      83: fox/variant
      84: salmon/size
      85: parrot/variant
      86: tropical_fish/pattern
      87: tropical_fish/base_color
      88: tropical_fish/pattern_color
      89: mooshroom/variant
      90: rabbit/variant
      91: pig/variant
      92: cow/variant
      93: chicken/variant
      94: zomie_nautilus/variant
      95: frog/variant
      96: horse/variant
      97: painting/variant
      98: llama/variant
      99: axolotl/variant
      100: cat/variant
      101: cat/collar
      102: sheep/color
      103: shulker/color
   SlotComponent:   
      type: SlotComponentType
      data: type ?
         if custom_data: anonymousNbt
         if max_stack_size: varint
         if max_damage: varint
         if damage: varint
         if unbreakable: void
         if use_effects:         
            can_sprint: bool
            interact_vibrations: bool
            speed_multiplier: f32
         if custom_name: anonymousNbt
         if minimum_attack_charge: f32
         if damage_type:         
            hasHolder: bool
            damageType: hasHolder ?
               if true: [
                  "registryEntryHolder",
                  {
                     "baseName": "damageTypeId",
                     "otherwise": {
                        "name": "data",
                        "type": "DamageTypeData"
                     }
                  }
               ]
               if false: string
         if item_name: anonymousNbt
         if item_model: string
         if lore: anonymousNbt[]varint
         if rarity: varint =>
            0: common
            1: uncommon
            2: rare
            3: epic
         if enchantments:         
            enchantments: []varint
               id: varint
               level: varint
         if stored_enchantments:         
            enchantments: []varint
               id: varint
               level: varint
         if can_place_on:         
            predicates: ItemBlockPredicate[]varint
         if can_break:         
            predicates: ItemBlockPredicate[]varint
         if attribute_modifiers:         
            attributes: []varint
               typeId: varint
               name: string
               value: f64
               operation: varint =>
                  0: add
                  1: multiply_base
                  2: multiply_total
               slot: varint =>
                  0: any
                  1: main_hand
                  2: off_hand
                  3: hand
                  4: feet
                  5: legs
                  6: chest
                  7: head
                  8: armor
                  9: body
                  10: saddle
            display:            
               type: varint =>
                  0: default
                  1: hidden
                  2: override
               component: type ?
                  if override: anonymousNbt
         if custom_model_data:         
            floats: f32[]varint
            flags: bool[]varint
            strings: string[]varint
            colors: i32[]varint
         if tooltip_display:         
            hideTooltip: bool
            hiddenComponents: varint[]varint
         if repair_cost: varint
         if creative_slot_lock: void
         if enchantment_glint_override: bool
         if intangible_projectile: void
         if blocks_attacks:         
            blockDelaySeconds: f32
            disableCooldownScale: f32
            damageReductions: []varint
               horizontalBlockingAngle: f32
               type?: IDSet
               base: f32
               factor: f32
            itemDamage:            
               threshold: f32
               base: f32
               factor: f32
            bypassedBy?: string
            blockSound?: ItemSoundHolder
            disableSound?: ItemSoundHolder
         if food:         
            nutrition: varint
            saturationModifier: f32
            canAlwaysEat: bool
         if consumable:         
            consume_seconds: f32
            animation: varint =>
               0: none
               1: eat
               2: drink
               3: block
               4: bow
               5: spear
               6: crossbow
               7: spyglass
               8: toot_horn
               9: brush
               10: bundle
            sound: ItemSoundHolder
            makes_particles: bool
            effects: ItemConsumeEffect[]varint
         if use_remainder: Slot
         if use_cooldown:         
            seconds: f32
            cooldownGroup?: string
         if damage_resistant: string
         if tool:         
            rules: []varint
               blocks: IDSet
               speed?: f32
               correctDropForBlocks?: bool
            defaultMiningSpeed: f32
            damagePerBlock: varint
            canDestroyBlocksInCreative: bool
         if weapon:         
            itemDamagePerAttack: varint
            disableBlockingForSeconds: f32
         if attack_range:         
            minRange: f32
            maxRange: f32
            minCreativeRange: f32
            maxCreativeRange: f32
            hitboxMargin: f32
            mobFactor: f32
         if enchantable: varint
         if equippable:         
            slot: varint =>
               0: main_hand
               1: off_hand
               2: feet
               3: legs
               4: chest
               5: head
               6: body
               7: saddle
            sound: ItemSoundHolder
            model?: string
            cameraOverlay?: string
            allowedEntities?: IDSet
            dispensable: bool
            swappable: bool
            damageable: bool
            equipOnInteract: bool
            shearable: bool
            shearingSound: ItemSoundHolder
         if repairable:         
            items: IDSet
         if glider: void
         if tooltip_style: string
         if death_protection:         
            effects: ItemConsumeEffect[]varint
         if piercing_weapon:         
            dealsKnockback: bool
            dismounts: bool
            sound?: ItemSoundHolder
            hitSound?: ItemSoundHolder
         if kinetic_weapon:         
            contactCooldownTicks: varint
            delayTicks: varint
            dismountConditions?: KineticWeaponCondition
            knockbackConditions?: KineticWeaponCondition
            damageConditions?: KineticWeaponCondition
            forwardMovement: f32
            damageMultiplier: f32
            sound?: ItemSoundHolder
            hitSound?: ItemSoundHolder
         if swing_animation:         
            type: varint =>
               0: none
               1: whack
               2: stab
            duration: varint
         if dyed_color: i32
         if map_color: i32
         if map_id: varint
         if map_decorations: anonymousNbt
         if map_post_processing: varint
         if potion_duration_scale: f32
         if charged_projectiles:         
            projectiles: Slot[]varint
         if bundle_contents:         
            contents: Slot[]varint
         if potion_contents:         
            potionId?: varint
            customColor?: i32
            customEffects: ItemPotionEffect[]varint
            customName?: string
         if suspicious_stew_effects:         
            effects: []varint
               effect: varint
               duration: varint
         if writable_book_content:         
            pages: ItemBookPage[]varint
         if written_book_content:         
            rawTitle: string
            filteredTitle?: string
            author: string
            generation: varint
            pages: ItemWrittenBookPage[]varint
            resolved: bool
         if trim:         
            material: [
               "registryEntryHolder",
               {
                  "baseName": "materialId",
                  "otherwise": {
                     "name": "data",
                     "type": "ArmorTrimMaterial"
                  }
               }
            ]
            pattern: [
               "registryEntryHolder",
               {
                  "baseName": "patternId",
                  "otherwise": {
                     "name": "data",
                     "type": "ArmorTrimPattern"
                  }
               }
            ]
         if debug_stick_state: anonymousNbt
         if entity_data:         
            type: varint
            data: anonymousNbt
         if block_entity_data:         
            type: varint
            data: anonymousNbt
         if bucket_entity_data: anonymousNbt
         if instrument:         
            hasHolder: bool
            data: hasHolder ?
               if true: [
                  "registryEntryHolder",
                  {
                     "baseName": "instrumentId",
                     "otherwise": {
                        "name": "data",
                        "type": "InstrumentData"
                     }
                  }
               ]
               if false: string
         if provides_trim_material:         
            hasHolder: bool
            material: hasHolder ?
               if true: [
                  "registryEntryHolder",
                  {
                     "baseName": "materialId",
                     "otherwise": {
                        "name": "data",
                        "type": "ArmorTrimMaterial"
                     }
                  }
               ]
               if false: string
         if ominous_bottle_amplifier: varint
         if jukebox_playable:         
            hasHolder: bool
            song: hasHolder ?
               if true: [
                  "registryEntryHolder",
                  {
                     "baseName": "songId",
                     "otherwise": {
                        "name": "data",
                        "type": "JukeboxSongData"
                     }
                  }
               ]
               if false: string
         if provides_banner_patterns: string
         if recipes: anonymousNbt
         if lodestone_tracker:         
            globalPosition?: GlobalPos
            tracked: bool
         if firework_explosion: ItemFireworkExplosion
         if fireworks:         
            flightDuration: varint
            explosions: ItemFireworkExplosion[]varint
         if profile: ResolvableProfile
         if note_block_sound: string
         if banner_patterns:         
            layers: BannerPatternLayer[]varint
         if base_color: varint
         if pot_decorations:         
            decorations: varint[]varint
         if container:         
            contents: Slot[]varint
         if block_state:         
            properties: []varint
               name: string
               value: string
         if bees:         
            bees: []varint
               nbtData: anonymousNbt
               ticksInHive: varint
               minTicksInHive: varint
         if lock: anonymousNbt
         if container_loot: anonymousNbt
         if break_sound: ItemSoundHolder
         if villager/variant: varint
         if wolf/variant: varint
         if wolf/sound_variant: varint
         if wolf/collar: varint
         if fox/variant: varint
         if salmon/size: varint
         if parrot/variant: varint
         if tropical_fish/pattern: varint
         if tropical_fish/base_color: varint
         if tropical_fish/pattern_color: varint
         if mooshroom/variant: varint
         if rabbit/variant: varint
         if pig/variant: varint
         if cow/variant: varint
         if chicken/variant: [
            "registryEntryHolder",
            {
               "baseName": "variantId",
               "otherwise": {
                  "name": "variantData",
                  "type": "string"
               }
            }
         ]
         if zombie_nautilus/variant: [
            "registryEntryHolder",
            {
               "baseName": "variantId",
               "otherwise": {
                  "name": "variantData",
                  "type": "string"
               }
            }
         ]
         if frog/variant: varint
         if horse/variant: varint
         if painting/variant: [
            "registryEntryHolder",
            {
               "baseName": "variantId",
               "otherwise": {
                  "name": "data",
                  "type": "EntityMetadataPaintingVariant"
               }
            }
         ]
         if llama/variant: varint
         if axolotl/variant: varint
         if cat/variant: varint
         if cat/collar: varint
         if sheep/color: varint
         if shulker/color: varint
   ItemSoundEvent:   
      soundName: string
      fixedRange?: f32
   ItemSoundHolder: [
      "registryEntryHolder",
      {
         "baseName": "soundId",
         "otherwise": {
            "name": "data",
            "type": "ItemSoundEvent"
         }
      }
   ]
   ItemFireworkExplosion:   
      shape: varint =>
         0: small_ball
         1: large_ball
         2: star
         3: creeper
         4: burst
      colors: i32[]varint
      fadeColors: i32[]varint
      hasTrail: bool
      hasTwinkle: bool
   ItemEffectDetail:   
      amplifier: varint
      duration: varint
      ambient: bool
      showParticles: bool
      showIcon: bool
      hiddenEffect?: ItemEffectDetail
   ItemPotionEffect:   
      id: varint
      details: ItemEffectDetail
   ItemBlockProperty:   
      name: string
      isExactMatch: bool
      value: isExactMatch ?
         if true:         
            exactValue: string
         if false:         
            minValue: string
            maxValue: string
   ExactComponentMatcher: SlotComponent[]varint
   DataComponentMatchers:   
      exactMatchers: ExactComponentMatcher
      partialMatchers: varint[]varint
   ItemBlockPredicate:   
      blockSet?: [
         "registryEntryHolderSet",
         {
            "base": {
               "name": "name",
               "type": "string"
            },
            "otherwise": {
               "name": "blockIds",
               "type": "varint"
            }
         }
      ]
      properties?: ItemBlockProperty[]varint
      nbt: anonOptionalNbt
      components: DataComponentMatchers
   ItemBookPage:   
      content: string
      filteredContent?: string
   ItemWrittenBookPage:   
      content: anonymousNbt
      filteredContent: anonOptionalNbt
   ItemConsumeEffect:   
      type: varint =>
         0: apply_effects
         1: remove_effects
         2: clear_all_effects
         3: teleport_randomly
         4: play_sound
      _: type ?
         if apply_effects:         
            effects: ItemPotionEffect[]varint
            probability: f32
         if remove_effects:         
            effects: IDSet
         if clear_all_effects: void
         if teleport_randomly:         
            diameter: f32
         if play_sound:         
            sound: ItemSoundHolder
   ArmorTrimMaterial:   
      assetBase: string
      overrideArmorAssets: []varint
         key: string
         value: string
      description: anonymousNbt
   ArmorTrimPattern:   
      assetId: string
      description: anonymousNbt
      decal: bool
   InstrumentData:   
      soundEvent: ItemSoundHolder
      useDuration: f32
      range: f32
      description: anonymousNbt
   JukeboxSongData:   
      soundEvent: ItemSoundHolder
      description: anonymousNbt
      lengthInSeconds: f32
      comparatorOutput: varint
   BannerPattern:   
      assetId: string
      translationKey: string
   BannerPatternLayer:   
      pattern: [
         "registryEntryHolder",
         {
            "baseName": "patternId",
            "otherwise": {
               "name": "data",
               "type": "BannerPattern"
            }
         }
      ]
      colorId: varint
   DamageTypeData:   
      msgId: string
      scaling: varint =>
         0: never
         1: when_caused_by_living_non_player
         2: always
      exhaustion: f32
      effects: varint =>
         0: hurt
         1: thorns
         2: drowning
         3: burning
         4: poking
         5: freezing
      deathMessageType: varint =>
         0: default
         1: fall_variants
         2: intentional_game_design
   KineticWeaponCondition:   
      maxDurationTicks: varint
      minSpeed: f32
      minRelativeSpeed: f32
   UntrustedSlotComponent:   
      type: SlotComponentType
      data: ByteArray
   UntrustedSlot:   
      itemCount: varint
      _: itemCount ?
         if 0: void
         if false: void
         default:         
            itemId: varint
            addedComponentCount: varint
            removedComponentCount: varint
            components: UntrustedSlotComponent[]$addedComponentCount
            removeComponents: []$removedComponentCount
               type: SlotComponentType
   Slot:   
      itemCount: varint
      _: itemCount ?
         if 0: void
         default:         
            itemId: varint
            addedComponentCount: varint
            removedComponentCount: varint
            components: SlotComponent[]$addedComponentCount
            removeComponents: []$removedComponentCount
               type: SlotComponentType
   HashedSlot:   
      itemId: varint
      itemCount: varint
      components: []varint
         type: SlotComponentType
         hash: i32
      removeComponents: []varint
         type: SlotComponentType
   RespawnData:   
      globalPos: GlobalPos
      yaw: f32
      pitch: f32
   GlobalPos:   
      dimensionName: string
      location: position
   DebugStructureInfo:   
      boundingBoxMin: position
      boundingBoxMax: position
      pieces: []varint
         boundingBoxMin: position
         boundingBoxMax: position
         isStart: bool
   Node:   
      position: vec3i32
      walkedDistance: f32
      costMalus: f32
      closed: bool
      type: varint =>
         0: blocked
         1: open
         2: walkable
         3: walkable_door
         4: trapdoor
         5: powder_snow
         6: danger_powder_snow
         7: fence
         8: lava
         9: water
         10: water_border
         11: rail
         12: unpassable_rail
         13: danger_fire
         14: damage_fire
         15: danger_other
         16: damage_other
         17: door_open
         18: door_wood_closed
         19: door_iron_closed
         20: breach
         21: leaves
         22: sticky_honey
         23: cocoa
         24: damage_cautious
         25: danger_trapdoor
      f: f32
   PathDebugData:   
      openSet: Node[]varint
      closedSet: Node[]varint
      targetNodes: Node[]varint
   Path:   
      reached: bool
      nextNodeIndex: i32
      target: position
      nodes: Node[]varint
      debugData: PathDebugData
   DebugSubscriptionDataType: varint =>
      0: DedicatedServerTickTime
      1: Bees
      2: Brains
      3: Breezes
      4: GoalSelectors
      5: EntityPaths
      6: EntityBlockIntersections
      7: BeeHives
      8: Pois
      9: RedstoneWireOrientations
      10: VillageSections
      11: Raids
      12: Structures
      13: GameEventListeners
      14: NeighborUpdates
      15: GameEvents
   DebugSubscriptionUpdate:   
      type: DebugSubscriptionDataType
      _: type ?
         if DedicatedServerTickTime: void
         default:         
            payload?: type ?
               if DedicatedServerTickTime: void
               if VillageSections: void
               if Bees:               
                  hivePos?: position
                  flowerPos?: position
                  travelTicks: varint
                  blacklistedHives: position[]varint
               if Brains:               
                  name: string
                  profession: string
                  xp: i32
                  health: f32
                  maxHealth: f32
                  inventory: string
                  wantsGolem: bool
                  angerLevel: i32
                  activities: string[]varint
                  behaviors: string[]varint
                  memories: string[]varint
                  gossips: string[]varint
                  pois: position[]varint
                  potentialPois: position[]varint
               if Breezes:               
                  attackTarget?: varint
                  jumpTarget?: position
               if GoalSelectors:               
                  goals: []varint
                     priority: varint
                     running: bool
                     name: string
               if EntityPaths:               
                  path: Path
                  maxNodeDistance: f32
               if EntityBlockIntersections:               
                  id: varint
               if BeeHives:               
                  type: varint
                  occupantCount: varint
                  honeyLevel: varint
                  sedated: bool
               if Pois:               
                  pos: position
                  poiType: varint
                  freeTicketCount: varint
               if RedstoneWireOrientations:               
                  index: varint
               if Raids:               
                  positions: position[]varint
               if Structures:               
                  structures: DebugStructureInfo[]varint
               if GameEventListeners:               
                  listenerRadius: varint
               if NeighborUpdates:               
                  pos: position
               if GameEvents:               
                  event: varint
                  pos: vec3f64
   DebugSubscriptionEvent:   
      type: DebugSubscriptionDataType
      value: type ?
         if DedicatedServerTickTime: void
         if VillageSections: void
         if Bees:         
            hivePos?: position
            flowerPos?: position
            travelTicks: varint
            blacklistedHives: position[]varint
         if Brains:         
            name: string
            profession: string
            xp: i32
            health: f32
            maxHealth: f32
            inventory: string
            wantsGolem: bool
            angerLevel: i32
            activities: string[]varint
            behaviors: string[]varint
            memories: string[]varint
            gossips: string[]varint
            pois: position[]varint
            potentialPois: position[]varint
         if Breezes:         
            attackTarget?: varint
            jumpTarget?: position
         if GoalSelectors:         
            priority: varint
            running: bool
            name: string
         if EntityPaths:         
            path: Path
            maxNodeDistance: f32
         if EntityBlockIntersections:         
            id: varint
         if BeeHives:         
            type: varint
            occupantCount: varint
            honeyLevel: varint
            sedated: bool
         if Pois:         
            pos: position
            poiType: varint
            freeTicketCount: varint
         if RedstoneWireOrientations:         
            index: varint
         if Raids:         
            positions: position[]varint
         if Structures:         
            structures: DebugStructureInfo[]varint
         if GameEventListeners:         
            listenerRadius: varint
         if NeighborUpdates:         
            pos: position
         if GameEvents:         
            event: varint
            pos: vec3f64
